<section class="section contact" id="contact">
  <div class="container">
    <h2 class="section__heading">Boek ons</h2>
    <p class="section__intro">Interesse in een optreden? Stuur ons een berichtje en we nemen zo snel mogelijk contact op.</p>
    <div class="contact__layout">
      <form class="contact__form" id="contact-form" novalidate>
        <div class="form-field">
          <label for="name">Naam</label>
          <input type="text" id="name" name="name" required autocomplete="name" placeholder="Jouw naam">
        </div>
        <div class="form-field">
          <label for="email">E-mailadres</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="jouw@email.be">
        </div>
        <div class="form-field">
          <label for="message">Bericht</label>
          <textarea id="message" name="message" rows="6" required placeholder="Vertel ons over je evenement…"></textarea>
        </div>
        <button type="submit" class="btn btn--primary">Verstuur</button>
      </form>
      <div class="contact__direct">
        <p>Of neem rechtstreeks contact op:</p>
        <a href="mailto:{{ .Site.Params.contactEmail }}" class="contact__email">{{ .Site.Params.contactEmail }}</a>
      </div>
    </div>
  </div>
</section>
